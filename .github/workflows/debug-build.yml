name: 🔨 Debug Build

on:
  push:
    branches: [ develop, main, "feature/**" ]
  workflow_dispatch:   # Allow manual trigger from GitHub Actions UI

jobs:
  build-debug:
    name: Build Debug APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ☕ Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 🐘 Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', '**/libs.versions.toml') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: 🔧 Grant execute permission to gradlew
        run: chmod +x ./gradlew

      - name: 🏗️ Build Debug APK
        run: ./gradlew assembleDebug --stacktrace --no-daemon

      - name: 📦 Upload Debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: hmxshield-debug-${{ github.run_number }}
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7

      - name: ✅ Build Summary
        run: |
          echo "## 🛡 HMX Shield Debug Build" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **APK:** Download from Actions → Artifacts above" >> $GITHUB_STEP_SUMMARY
