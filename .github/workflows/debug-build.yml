name: 🔨 Debug Build

on:
  push:
    branches: [ develop, main, "feature/**" ]
  workflow_dispatch:

jobs:
  build-debug:
    name: Build Debug APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ☕ Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 🐘 Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', '**/libs.versions.toml') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: 📦 Download Gradle Wrapper JAR
        run: |
          mkdir -p gradle/wrapper
          curl -fsSL https://github.com/gradle/gradle/raw/v8.7.0/gradle/wrapper/gradle-wrapper.jar \
            -o gradle/wrapper/gradle-wrapper.jar
          chmod +x gradlew

      - name: 🏗️ Build Debug APK
        run: ./gradlew assembleDebug --stacktrace --no-daemon

      - name: 📦 Upload Debug APK
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: hmxshield-debug-${{ github.run_number }}
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
          if-no-files-found: warn

      - name: ✅ Build Summary
        if: always()
        run: |
          echo "## 🛡 HMX Shield Debug Build" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          if [ -f app/build/outputs/apk/debug/app-debug.apk ]; then
            echo "- ✅ APK built — download from Artifacts above" >> $GITHUB_STEP_SUMMARY
          else
            echo "- ❌ Build failed — check logs above" >> $GITHUB_STEP_SUMMARY
          fi
