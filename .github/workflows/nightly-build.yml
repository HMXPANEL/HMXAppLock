name: 🌙 Nightly Build

on:
  schedule:
    - cron: '0 2 * * *'   # Every day at 02:00 UTC
  workflow_dispatch:        # Manual trigger

jobs:
  nightly:
    name: Nightly Debug Build
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 📥 Checkout develop branch
        uses: actions/checkout@v4
        with:
          ref: develop

      - name: ☕ Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 🐘 Cache Gradle (fresh for nightly to catch stale caches)
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: nightly-gradle-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            nightly-gradle-${{ runner.os }}-

      - name: 🔧 Grant execute permission to gradlew
        run: chmod +x ./gradlew

      - name: 🏗️ Build Debug APK
        run: ./gradlew assembleDebug --no-daemon --refresh-dependencies

      - name: 🧪 Run Unit Tests
        run: ./gradlew testDebugUnitTest --no-daemon

      - name: 📦 Upload Nightly APK
        uses: actions/upload-artifact@v4
        with:
          name: hmxshield-nightly-${{ github.run_number }}
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 3

      - name: 📣 Notify on Failure
        if: failure()
        run: |
          echo "## ❌ Nightly Build FAILED" >> $GITHUB_STEP_SUMMARY
          echo "Check the logs above for dependency or compilation issues." >> $GITHUB_STEP_SUMMARY
          echo "Branch: develop | Run: ${{ github.run_number }}" >> $GITHUB_STEP_SUMMARY

      - name: ✅ Nightly Summary
        if: success()
        run: |
          echo "## ✅ Nightly Build Passed" >> $GITHUB_STEP_SUMMARY
          echo "- Branch: develop" >> $GITHUB_STEP_SUMMARY
          echo "- APK available for 3 days in Artifacts" >> $GITHUB_STEP_SUMMARY
