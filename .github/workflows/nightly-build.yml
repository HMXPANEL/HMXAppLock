name: 🌙 Nightly Build

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  nightly:
    name: Nightly Debug Build
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 📥 Checkout develop branch
        uses: actions/checkout@v4
        with:
          ref: main

      - name: ☕ Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 🐘 Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: 🔧 Fix gradlew permission
        run: chmod +x gradlew

      - name: 🏗️ Build Debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: 🧪 Run Unit Tests
        run: ./gradlew testDebugUnitTest --no-daemon
        continue-on-error: true

      - name: 📦 Upload Nightly APK
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: hmxshield-nightly-${{ github.run_number }}
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 3
          if-no-files-found: warn

      - name: 📋 Nightly Summary
        if: always()
        run: |
          echo "## 🌙 Nightly Build — Run ${{ github.run_number }}" >> $GITHUB_STEP_SUMMARY
          if [ -f app/build/outputs/apk/debug/app-debug.apk ]; then
            echo "✅ APK built successfully" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Build failed — check logs" >> $GITHUB_STEP_SUMMARY
          fi
