name: 🌙 Nightly Build

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  nightly:
    name: Nightly Debug Build
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 📥 Checkout develop branch
        uses: actions/checkout@v4
        with:
          ref: develop

      - name: ☕ Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 🐘 Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          cache-read-only: false

      - name: 🏗️ Build Debug APK
        run: ./gradlew assembleDebug --no-daemon --refresh-dependencies

      - name: 🧪 Run Unit Tests
        run: ./gradlew testDebugUnitTest --no-daemon

      - name: 📦 Upload Nightly APK
        uses: actions/upload-artifact@v4
        with:
          name: hmxshield-nightly-${{ github.run_number }}
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 3

      - name: 📋 Nightly Summary
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            echo "## ✅ Nightly Build Passed" >> $GITHUB_STEP_SUMMARY
          else
            echo "## ❌ Nightly Build FAILED" >> $GITHUB_STEP_SUMMARY
            echo "Check logs for dependency or compilation issues." >> $GITHUB_STEP_SUMMARY
          fi
          echo "- Branch: develop | Run: ${{ github.run_number }}" >> $GITHUB_STEP_SUMMARY
