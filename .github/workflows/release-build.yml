name: 🚀 Release Build

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version_name:
        description: 'Version name (e.g. 1.0.0)'
        required: true

jobs:
  build-release:
    name: Build & Sign Release APK
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ☕ Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 🐘 Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: 🔧 Fix gradlew permission
        run: chmod +x gradlew

      - name: 🔑 Decode Keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > app/hmxshield.keystore

      - name: 🏗️ Build Release APK
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=hmxshield.keystore \
            -Pandroid.injected.signing.store.password=$KEYSTORE_PASSWORD \
            -Pandroid.injected.signing.key.alias=$KEY_ALIAS \
            -Pandroid.injected.signing.key.password=$KEY_PASSWORD \
            --stacktrace --no-daemon

      - name: 🧹 Remove keystore
        if: always()
        run: rm -f app/hmxshield.keystore

      - name: 📦 Rename APK
        run: |
          VERSION="${{ github.ref_name }}"
          mv app/build/outputs/apk/release/app-release.apk \
             app/build/outputs/apk/release/hmxshield-${VERSION}.apk

      - name: 🚀 Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/release/hmxshield-*.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

# ─────────────────────────────────────────────────────────────────────────────
# REQUIRED SECRETS (Settings → Secrets → Actions):
#   KEYSTORE_BASE64    — base64 of your .keystore file
#   KEYSTORE_PASSWORD  — keystore password
#   KEY_ALIAS          — key alias
#   KEY_PASSWORD       — key password
# ─────────────────────────────────────────────────────────────────────────────
